<!-- confirmation-popup.component.html -->
<div class="popup-overlay" (click)="close()">
    <div class="popup-container" (click)="$event.stopPropagation()">
        <div class="popup-icon" [class]="type">
            <svg [attr.width]="iconSize" [attr.height]="iconSize" viewBox="0 0 24 24" fill="currentColor">
                <path *ngIf="type === 'warning'" d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z" />
                <path *ngIf="type === 'danger'"
                    d="M12 2C6.47 2 2 6.47 2 12s4.47 10 10 10 10-4.47 10-10S17.53 2 12 2zm5 13.59L15.59 17 12 13.41 8.41 17 7 15.59 10.59 12 7 8.41 8.41 7 12 10.59 15.59 7 17 8.41 13.41 12 17 15.59z" />
                <path *ngIf="type === 'success'"
                    d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z" />
                <path *ngIf="type === 'info'"
                    d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z" />
            </svg>
        </div>

        <div class="popup-content">
            <h3 class="popup-title">{{ title }}</h3>
            <p class="popup-message">{{ message }}</p>
        </div>

        <div class="popup-actions">
            <button *ngIf="showCancel" type="button" class="btn btn-secondary" (click)="close()">
                {{ cancelText }}
            </button>
            <button type="button" class="btn" [class]="confirmButtonClass" (click)="confirm()">
                {{ confirmText }}
            </button>
        </div>
    </div>
</div>
