<!-- create-user-modal.component.html -->
<div class="modal-overlay" (click)="closeModal()">
    <div class="modal-container" (click)="$event.stopPropagation()">
        <div class="modal-header">
            <h2 class="modal-title">{{ isEditMode ? 'Редактирование пользователя' : 'Создание пользователя' }}</h2>
            <button class="close-button" (click)="closeModal()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                    <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" />
                </svg>
            </button>
        </div>

        <form [formGroup]="userForm" (ngSubmit)="onSubmit()" class="modal-content">
            <div class="form-grid">
                <!-- Basic Information -->
                <div class="form-section">
                    <h3 class="section-title">Основная информация</h3>

                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Имя <span class="required">*</span></label>
                            <input type="text" formControlName="first_name" class="form-input"
                                placeholder="Введите имя">
                            <div class="error-message"
                                *ngIf="userForm.get('first_name')?.invalid && userForm.get('first_name')?.touched">
                                Имя обязательно
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Фамилия <span class="required">*</span></label>
                            <input type="text" formControlName="last_name" class="form-input"
                                placeholder="Введите фамилию">
                            <div class="error-message"
                                *ngIf="userForm.get('last_name')?.invalid && userForm.get('last_name')?.touched">
                                Фамилия обязательна
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Имя пользователя <span class="required">*</span></label>
                        <input type="text" formControlName="username" class="form-input"
                            placeholder="Введите имя пользователя">
                        <div class="error-message"
                            *ngIf="userForm.get('username')?.invalid && userForm.get('username')?.touched">
                            Имя пользователя обязательно
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Email <span class="required">*</span></label>
                        <input type="email" formControlName="email" class="form-input" placeholder="Введите email">
                        <div class="error-message"
                            *ngIf="userForm.get('email')?.invalid && userForm.get('email')?.touched">
                            Введите корректный email
                        </div>
                    </div>
                </div>

                <!-- Security -->
                <div class="form-section">
                    <h3 class="section-title">Безопасность</h3>

                    <div class="form-group" *ngIf="!isEditMode">
                        <label class="form-label">Пароль <span class="required">*</span></label>
                        <div class="password-input-wrapper">
                            <input [type]="showPassword ? 'text' : 'password'" formControlName="password"
                                class="form-input" placeholder="Введите пароль">
                            <button type="button" class="password-toggle" (click)="togglePasswordVisibility()">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                                    <path *ngIf="!showPassword"
                                        d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z" />
                                    <path *ngIf="showPassword"
                                        d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z" />
                                </svg>
                            </button>
                        </div>
                        <div class="error-message"
                            *ngIf="userForm.get('password')?.invalid && userForm.get('password')?.touched">
                            Пароль должен содержать минимум 6 символов
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Статус аккаунта</label>
                        <div class="checkbox-group">
                            <label class="checkbox-label">
                                <input type="checkbox" formControlName="is_active" class="checkbox-input">
                                <span class="checkbox-custom"></span>
                                Активный
                            </label>
                            <label class="checkbox-label">
                                <input type="checkbox" formControlName="is_superuser" class="checkbox-input">
                                <span class="checkbox-custom"></span>
                                Администратор
                            </label>
                        </div>
                    </div>
                </div>

                <!-- Additional Settings -->
                <div class="form-section">
                    <h3 class="section-title">Дополнительные настройки</h3>

                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Локаль</label>
                            <select formControlName="locale" class="form-select">
                                <option value="ru-RU">Русский (Россия)</option>
                                <option value="en-US">English (US)</option>
                                <option value="en-GB">English (UK)</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Часовой пояс</label>
                            <select formControlName="timezone" class="form-select">
                                <option value="Europe/Moscow">Москва (UTC+3)</option>
                                <option value="Europe/London">Лондон (UTC+0)</option>
                                <option value="America/New_York">Нью-Йорк (UTC-5)</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <div class="modal-actions">
                <button type="button" class="btn btn-secondary" (click)="closeModal()">Отмена</button>
                <button type="submit" class="btn btn-primary">
                    <span *ngIf="!isSubmitting">{{ isEditMode ? 'Сохранить' : 'Создать' }}</span>
                    <span *ngIf="isSubmitting" class="loading">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm0 18a8 8 0 1 1 8-8 8 8 0 0 1-8 8z"
                                opacity="0.3" />
                            <path d="M12 2a10 10 0 0 0 0 20 10 10 0 0 0 0-20zm0 18a8 8 0 1 1 8-8 8 8 0 0 1-8 8z" />
                        </svg>
                        {{ isEditMode ? 'Сохранение...' : 'Создание...' }}
                    </span>
                </button>
            </div>
        </form>
    </div>
</div>
