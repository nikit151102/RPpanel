<!-- manage-roles-modal.component.html -->
<div class="modal-overlay" (click)="closeModal()">
    <div class="modal-container" (click)="$event.stopPropagation()">
        <div class="modal-header">
            <h2 class="modal-title">Управление ролями</h2>
            <button class="close-button" (click)="closeModal()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                    <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" />
                </svg>
            </button>
        </div>

        <div class="modal-content">
            <div class="user-info-section">
                <div class="user-avatar-large">
                    {{ getUserInitials() }}
                </div>
                <div class="user-details-large">
                    <div class="user-name">{{ user.first_name }} {{ user.last_name }}</div>
                    <div class="user-email">{{ user.email }}</div>
                </div>
            </div>

            <div class="roles-section">
                <h3 class="section-title">Доступные роли</h3>
                <p class="section-description">Выберите роли для назначения пользователю</p>

                <div class="roles-list">
                    <div *ngFor="let role of availableRoles" class="role-item">
                        <label class="role-checkbox">
                            <input type="checkbox" [checked]="isRoleSelected(role.id)" (change)="toggleRole(role.id)"
                                class="checkbox-input">
                            <span class="checkbox-custom"></span>
                            <div class="role-info">
                                <div class="role-name">{{ role.name }}</div>
                                <div class="role-description">{{ role.description }}</div>
                            </div>
                        </label>
                    </div>
                </div>
            </div>

            <div class="selected-roles-section" *ngIf="selectedRoles.length > 0">
                <h4 class="subsection-title">Выбранные роли</h4>
                <div class="selected-roles">
                    <span *ngFor="let role of selectedRoles" class="selected-role-tag">
                        {{ role.name }}
                        <button class="remove-role" (click)="removeRole(role.id)">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
                                <path
                                    d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z" />
                            </svg>
                        </button>
                    </span>
                </div>
            </div>

            <div class="modal-actions">
                <button type="button" class="btn btn-secondary" (click)="closeModal()">Отмена</button>
                <button type="button" class="btn btn-primary" (click)="saveRoles()" [disabled]="isSubmitting">
                    <span *ngIf="!isSubmitting">Сохранить роли</span>
                    <span *ngIf="isSubmitting" class="loading">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm0 18a8 8 0 1 1 8-8 8 8 0 0 1-8 8z"
                                opacity="0.3" />
                            <path d="M12 2a10 10 0 0 0 0 20 10 10 0 0 0 0-20zm0 18a8 8 0 1 1 8-8 8 8 0 0 1-8 8z" />
                        </svg>
                        Сохранение...
                    </span>
                </button>
            </div>
        </div>
    </div>
</div>
