<div class="modal-overlay show">
  <div class="modal-container modal-lg">
    <div class="modal-header bg-success text-white">
      <h3><i class="fas fa-user-plus me-2"></i>Создание отпуска для сотрудника</h3>
      <button class="close-btn text-white" (click)="close.emit()">×</button>
    </div>
    
    <form [formGroup]="vacationForUserForm" (ngSubmit)="submit.emit()">
      <div class="modal-body">
        <!-- Шаг 1: Выбор сотрудника -->
        <div class="step-section mb-4">
          <h5 class="step-title"><span class="step-number">1</span> Выберите сотрудника</h5>
          <div class="mb-3">
            <label class="form-label">Сотрудник *</label>
            <select class="form-select" formControlName="user_id" (change)="userSelect.emit()">
              <option value="">Выберите сотрудника...</option>
              <option *ngFor="let user of users" [value]="user.id">
                {{ user.first_name }} {{ user.last_name }} ({{ user.position }}, {{ user.department }})
              </option>
            </select>
            <div *ngIf="vacationForUserForm.get('user_id')?.invalid && vacationForUserForm.get('user_id')?.touched" 
                 class="text-danger small">
              Выберите сотрудника
            </div>
          </div>
          
          <div *ngIf="vacationForUserForm.get('user_id')?.value" class="alert alert-info">
            <i class="fas fa-info-circle me-2"></i>
            Выбран: {{ vacationForUser.user_name }}
          </div>
        </div>
        
        <!-- Шаг 2: Выбор периода -->
        <div class="step-section mb-4" *ngIf="vacationForUserForm.get('user_id')?.value">
          <h5 class="step-title"><span class="step-number">2</span> Выберите период</h5>
          
          <div class="period-selection mb-3">
            <label class="form-label">Длительность отпуска:</label>
            <div class="period-cards">
              <div *ngFor="let period of weekPeriods" 
                   class="period-card" 
                   [class.selected]="selectedPeriodForUser === period.id"
                   (click)="onPeriodClick(period.id)">
                <div class="period-card-icon" [style.color]="period.color">
                  <i class="fas fa-{{ period.icon }}"></i>
                </div>
                <div class="period-card-content">
                  <h6>{{ period.label }}</h6>
                  <p class="text-muted">{{ period.description }}</p>
                </div>
              </div>
            </div>
          </div>
          
          <div class="text-center mb-3">
            <button type="button" class="btn btn-primary" (click)="openWeekSelector.emit()">
              <i class="fas fa-calendar-alt me-2"></i>Выбрать даты
            </button>
            <button type="button" class="btn btn-outline-primary ms-2" (click)="openCheckLimits.emit()">
              <i class="fas fa-search me-2"></i>Проверить ограничения
            </button>
          </div>
          
          <div *ngIf="getStartDate()" class="alert alert-success">
            <i class="fas fa-calendar-check me-2"></i>
            Выбраны даты: {{ getStartDate() }} - {{ getEndDate() }}
            ({{ getTotalDays() }} дней)
          </div>
        </div>
        
        <!-- Шаг 3: Детали отпуска -->
        <div class="step-section" *ngIf="getStartDate()">
          <h5 class="step-title"><span class="step-number">3</span> Детали отпуска</h5>
          
          <div class="row mb-3">
            <div class="col-md-6">
              <label class="form-label">Тип отпуска *</label>
              <select class="form-select" formControlName="vacation_type">
                <option *ngFor="let type of vacationTypes" [value]="type.value">{{ type.label }}</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label">Всего дней *</label>
              <input type="number" class="form-control" formControlName="total_days" min="1" readonly>
            </div>
          </div>
          
          <div class="row mb-3">
            <div class="col-md-6">
              <label class="form-label">Рабочих дней *</label>
              <input type="number" class="form-control" formControlName="work_days" min="0" readonly>
            </div>
          </div>
          
          <div class="mb-3">
            <label class="form-label">Комментарий</label>
            <textarea class="form-control" formControlName="comment" rows="3"></textarea>
          </div>
        </div>
      </div>
      
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" (click)="close.emit()">Отмена</button>
        <button type="submit" class="btn btn-success" 
                [disabled]="isLoading || vacationForUserForm.invalid || !getStartDate()">
          <i class="fas fa-check me-2"></i>Создать отпуск
        </button>
      </div>
    </form>
  </div>
</div>
