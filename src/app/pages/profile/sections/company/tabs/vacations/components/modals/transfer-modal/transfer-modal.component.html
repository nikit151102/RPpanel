<div class="modal-overlay show">
  <div class="modal-container">
    <div class="modal-header bg-secondary text-white">
      <h3><i class="fas fa-exchange-alt me-2"></i>Перенос отпуска</h3>
      <button class="close-btn text-white" (click)="close.emit()">×</button>
    </div>
    
    <form [formGroup]="transferForm" (ngSubmit)="transfer.emit()">
      <div class="modal-body" *ngIf="currentVacation">
        <div class="alert alert-info">
          <i class="fas fa-info-circle me-2"></i>
          Перенос отпуска сотрудника: {{ currentVacation.user?.first_name }} {{ currentVacation.user?.last_name }}
        </div>
        
        <div class="mb-3">
          <p><strong>Текущий период:</strong> {{ formatDisplayDate(currentVacation.start_date) }} - {{ formatDisplayDate(currentVacation.end_date) }}</p>
        </div>
        
        <div class="row mb-3">
          <div class="col-md-6">
            <label class="form-label">Новая дата начала *</label>
            <input type="date" class="form-control" formControlName="new_start_date" 
                   (change)="onDatesChange()">
          </div>
          <div class="col-md-6">
            <label class="form-label">Новая дата окончания *</label>
            <input type="date" class="form-control" formControlName="new_end_date"
                   (change)="onDatesChange()">
          </div>
        </div>
        
        <div class="row mb-3">
          <div class="col-md-6">
            <label class="form-label">Всего дней *</label>
            <input type="number" class="form-control" formControlName="total_days" min="1" readonly>
          </div>
          <div class="col-md-6">
            <label class="form-label">Рабочих дней *</label>
            <input type="number" class="form-control" formControlName="work_days" min="0" readonly>
          </div>
        </div>
        
        <div class="mb-3">
          <label class="form-label">Причина переноса *</label>
          <textarea class="form-control" formControlName="transfer_reason" rows="3" 
                    placeholder="Укажите причину переноса отпуска..."></textarea>
          <div *ngIf="transferForm.get('transfer_reason')?.invalid && transferForm.get('transfer_reason')?.touched" 
               class="text-danger small">
            Укажите причину переноса
          </div>
        </div>
      </div>
      
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" (click)="close.emit()">Отмена</button>
        <button type="submit" class="btn btn-secondary" [disabled]="!transferForm.valid || isLoading">
          <i class="fas fa-exchange-alt me-2"></i>Перенести
        </button>
      </div>
    </form>
  </div>
</div>
