<div class="modal-overlay show">
  <div class="modal-container">
    <div class="modal-header bg-danger text-white">
      <h3><i class="fas fa-times-circle me-2"></i>Отклонение отпуска</h3>
      <button class="close-btn text-white" (click)="close.emit()">×</button>
    </div>
    
    <form [formGroup]="rejectForm" (ngSubmit)="reject.emit()">
      <div class="modal-body" *ngIf="currentVacation">
        <div class="alert alert-danger">
          <i class="fas fa-exclamation-triangle me-2"></i>
          Отклонение отпуска сотрудника: {{ currentVacation.user?.first_name }} {{ currentVacation.user?.last_name }}
        </div>
        
        <div class="mb-3">
          <label class="form-label">Причина отклонения *</label>
          <textarea class="form-control" formControlName="rejection_reason" rows="4" 
                    placeholder="Укажите причину отклонения отпуска (не менее 10 символов)..."></textarea>
          <div class="form-text">Обязательно укажите причину отклонения</div>
          <div *ngIf="rejectForm.get('rejection_reason')?.invalid && rejectForm.get('rejection_reason')?.touched" 
               class="text-danger small">
            Минимум 10 символов
          </div>
        </div>
      </div>
      
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" (click)="close.emit()">Отмена</button>
        <button type="submit" class="btn btn-danger" [disabled]="!rejectForm.valid || isLoading">
          <i class="fas fa-ban me-2"></i>Отклонить
        </button>
      </div>
    </form>
  </div>
</div>
