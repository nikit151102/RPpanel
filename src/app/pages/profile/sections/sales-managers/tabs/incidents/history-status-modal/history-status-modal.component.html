<div class="modal-overlay" (click)="closeModal()">
    <div class="modal-container" (click)="$event.stopPropagation()">
        <div class="modal-header">
            <h2 class="modal-title">История изменения статусов</h2>
            <button class="close-button" (click)="closeModal()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                    <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" />
                </svg>
            </button>
        </div>

        <div class="modal-content">
            <div class="timeline">
                <div *ngFor="let historyItem of historyData; let i = index" class="timeline-item"
                    [class.active]="i === 0">

                    <!-- Точка на временной линии -->
                    <div class="timeline-marker">
                        <div class="timeline-dot"></div>
                        <div class="timeline-line" *ngIf="i !== historyData.length - 1"></div>
                    </div>

                    <!-- Содержимое события -->
                    <div class="timeline-content">
                        <div class="status-change">
                            <span class="old-status" *ngIf="historyItem.old_status">
                                {{ historyItem.old_status.name }}
                            </span>
                            <span class="status-arrow" *ngIf="historyItem.old_status">→</span>
                            <span class="new-status" [class]="getStatusClass(historyItem.new_status.name)">
                                {{ historyItem.new_status.name }}
                            </span>
                        </div>

                        <div class="change-info">
                            <div class="change-date">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                                    <path
                                        d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8z" />
                                    <path d="M12.5 7H11v6l5.25 3.15.75-1.23-4.5-2.67z" />
                                </svg>
                                {{ formatDate(historyItem.changed_at) }}
                            </div>

                            <div class="change-time">
                                {{ formatTime(historyItem.changed_at) }}
                            </div>
                        </div>

                        <div class="comment" *ngIf="historyItem.comment">
                            <span class="comment-label">Комментарий:</span>
                            {{ historyItem.comment }}
                        </div>
                    </div>
                </div>
            </div>

            <div class="empty-state" *ngIf="!historyData || historyData.length === 0">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="currentColor">
                    <path
                        d="M19 3h-4.18C14.4 1.84 13.3 1 12 1c-1.3 0-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm2 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z" />
                </svg>
                <h3>История изменений отсутствует</h3>
                <p>Здесь будет отображаться история смены статусов</p>
            </div>
        </div>
    </div>
</div>
