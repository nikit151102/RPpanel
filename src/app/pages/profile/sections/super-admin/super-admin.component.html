<!-- drivers.component.html -->
<div class="drivers-layout">
  <!-- Боковое меню -->
  <nav class="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" 
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="logo-text">Логистика</span>
      </div>
    </div>

    <ul class="sidebar-menu">
      @for (item of itemsMenu; track item.route) {
        <li class="menu-item" [class.active]="currentRoute === item.route">
          <a class="menu-link" (click)="navigate(item.route)">
            <div class="menu-icon">
              @switch (item.route) {
                @case ('drivers') {
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                    <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" 
                          stroke="currentColor" stroke-width="2"/>
                  </svg>
                }
                @case ('routes') {
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                    <path d="M12 2C13.1 2 14 2.9 14 4s-.9 2-2 2-2-.9-2-2 .9-2 2-2zm9 7h-6v13h-2v-6h-2v6H9V9H3V7h18v2z" 
                          stroke="currentColor" stroke-width="2"/>
                  </svg>
                }
                @case ('directories') {
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                    <path d="M10 4H4a2 2 0 00-2 2v14a2 2 0 002 2h16a2 2 0 002-2V8a2 2 0 00-2-2h-8l-2-2z" 
                          stroke="currentColor" stroke-width="2"/>
                  </svg>
                }
              }
            </div>
            <span class="menu-text">{{ item.label }}</span>
            @if (currentRoute === item.route) {
              <div class="active-indicator"></div>
            }
          </a>
        </li>
      }
    </ul>

  </nav>

  <!-- Основной контент -->
  <main class="main-content">
    <div class="content-wrapper">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
