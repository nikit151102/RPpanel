<div class="modal-overlay" (click)="closeModal()">
    <div class="modal-container" (click)="$event.stopPropagation()">
        <div class="modal-header">
            <h2 class="modal-title">
                {{ exception ? '✏️ Редактирование дня исключения' : '🚫 Создание дня исключения' }}
            </h2>
            <button class="close-button" (click)="closeModal()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                    <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" />
                </svg>
            </button>
        </div>

        <form class="modal-form" (ngSubmit)="onSubmit()">
            <div class="input-group">
                <label class="input-label">
                    <span class="label-text">Дата *</span>
                    <input type="date" class="modern-input" [(ngModel)]="exceptionData.date" name="date" required
                        [min]="minDate">
                </label>
            </div>

            <div class="input-group">
                <label class="toggle-label">
                    <input type="checkbox" [(ngModel)]="exceptionData.isClosed" name="isClosed"
                        (change)="onClosedChange($event)">
                    <span class="toggle-slider"></span>
                    <span class="toggle-text">Выходной день</span>
                </label>
            </div>

            <div class="time-inputs-row" *ngIf="!exceptionData.isClosed">
                <div class="input-group">
                    <label class="input-label">
                        <span class="label-text">Время открытия</span>
                        <input type="time" class="modern-input" [(ngModel)]="exceptionData.openTime" name="openTime">
                    </label>
                </div>

                <div class="input-group">
                    <label class="input-label">
                        <span class="label-text">Время закрытия</span>
                        <input type="time" class="modern-input" [(ngModel)]="exceptionData.closeTime" name="closeTime">
                    </label>
                </div>
            </div>

            <div class="modal-actions">
                <button type="button" class="secondary-btn" (click)="closeModal()">Отмена</button>
                <button type="submit" class="primary-btn" [disabled]="!isFormValid() || isLoading">
                    <span *ngIf="!isLoading">
                        {{ exception ? '💾 Сохранить изменения' : '🚀 Создать исключение' }}
                    </span>
                    <span *ngIf="isLoading" class="loading">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm0 18a8 8 0 1 1 8-8 8 8 0 0 1-8 8z"
                                opacity="0.3" />
                            <path d="M12 2a10 10 0 0 0 0 20 10 10 0 0 0 0-20zm0 18a8 8 0 1 1 8-8 8 8 0 0 1-8 8z" />
                        </svg>
                        {{ exception ? 'Сохранение...' : 'Создание...' }}
                    </span>
                </button>
            </div>
        </form>
    </div>
</div>
